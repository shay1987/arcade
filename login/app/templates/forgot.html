<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Shay's Arcade</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>SHAY'S ARCADE</h1>
        </div>
        <div class="card">
            <h2>RESET PASSWORD</h2>
            {% if msg %}
            <div class="msg error">{{ msg }}</div>
            {% endif %}

            {% if step == 1 %}
            <p class="hint">Enter your username to begin.</p>
            <form method="post" action="/forgot">
                <div class="field">
                    <label>USERNAME</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <button type="submit">NEXT</button>
            </form>

            {% elif step == 2 %}
            <p class="hint">{{ question }}</p>
            <form method="post" action="/forgot/verify">
                <input type="hidden" name="username" value="{{ username }}">
                <div class="field">
                    <label>YOUR ANSWER</label>
                    <input type="text" name="answer" required autofocus>
                </div>
                <button type="submit">VERIFY</button>
            </form>

            {% elif step == 3 %}
            <p class="hint">Identity verified. Enter your new password.</p>
            <form method="post" action="/forgot/reset">
                <div class="field">
                    <label>NEW PASSWORD</label>
                    <input type="password" name="new_password" required autofocus>
                </div>
                <button type="submit">RESET PASSWORD</button>
            </form>
            {% endif %}

            <div class="links">
                <a href="/">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
