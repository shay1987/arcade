apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-login
  labels:
    {{- include "arcade.labels" . | nindent 4 }}
    app.kubernetes.io/component: login
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: login
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: login
    spec:
      containers:
        - name: login
          image: "{{ .Values.image.login.repository }}:{{ .Values.image.login.tag }}"
          imagePullPolicy: {{ .Values.image.login.pullPolicy }}
          ports:
            - containerPort: {{ .Values.loginApp.service.port }}
          env:
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-mysql-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mysql-pass
                  key: password
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-mysql-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-mysql-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-mysql-config
                  key: MYSQL_DATABASE
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mysql-pass
                  key: secretKey
          resources:
            {{- toYaml .Values.resources.login | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.loginApp.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.loginApp.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-login-svc
  labels:
    {{- include "arcade.labels" . | nindent 4 }}
    app.kubernetes.io/component: login
spec:
  type: {{ .Values.loginApp.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: login
  ports:
    - protocol: TCP
      port: {{ .Values.loginApp.service.port }}
      targetPort: {{ .Values.loginApp.service.port }}
