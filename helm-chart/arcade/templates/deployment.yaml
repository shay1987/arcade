apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-arcade
  labels:
    {{- include "arcade.labels" . | nindent 4 }}
    app.kubernetes.io/component: arcade
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: arcade
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: arcade
    spec:
      containers:
        - name: arcade
          image: "{{ .Values.image.arcade.repository }}:{{ .Values.image.arcade.tag }}"
          imagePullPolicy: {{ .Values.image.arcade.pullPolicy }}
          ports:
            - containerPort: {{ .Values.arcadeApp.service.port }}
          resources:
            {{- toYaml .Values.resources.arcade | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /arcade/
              port: {{ .Values.arcadeApp.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /arcade/
              port: {{ .Values.arcadeApp.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-arcade-svc
  labels:
    {{- include "arcade.labels" . | nindent 4 }}
    app.kubernetes.io/component: arcade
spec:
  type: {{ .Values.arcadeApp.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: arcade
  ports:
    - protocol: TCP
      port: {{ .Values.arcadeApp.service.port }}
      targetPort: {{ .Values.arcadeApp.service.port }}
