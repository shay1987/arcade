name: Docker CI

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  ARCADE_IMAGE: shay1987/arcade
  LOGIN_IMAGE: shay1987/login

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute version tag
        id: version
        run: |
          existing=$(curl -s "https://hub.docker.com/v2/repositories/${ARCADE_IMAGE}/tags" \
            | jq -r '.results[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [[ -n "$existing" ]]; then
            latest=$(echo "$existing" | sort -V | tail -n1)
            IFS=. read -r major minor patch <<< "$latest"
            echo "version=${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push arcade image
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            docker build -t "${ARCADE_IMAGE}:latest" -t "${ARCADE_IMAGE}:${{ steps.version.outputs.version }}" .
            docker push "${ARCADE_IMAGE}:latest"
            docker push "${ARCADE_IMAGE}:${{ steps.version.outputs.version }}"
          else
            docker build -t "${ARCADE_IMAGE}:${{ steps.version.outputs.version }}" .
            docker push "${ARCADE_IMAGE}:${{ steps.version.outputs.version }}"
          fi

      - name: Build and push login image
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            docker build -t "${LOGIN_IMAGE}:latest" -t "${LOGIN_IMAGE}:${{ steps.version.outputs.version }}" ./login
            docker push "${LOGIN_IMAGE}:latest"
            docker push "${LOGIN_IMAGE}:${{ steps.version.outputs.version }}"
          else
            docker build -t "${LOGIN_IMAGE}:${{ steps.version.outputs.version }}" ./login
            docker push "${LOGIN_IMAGE}:${{ steps.version.outputs.version }}"
          fi
